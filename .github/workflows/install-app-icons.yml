name: install app icons

on:
  push:
    paths:
      - .github/workflows/install-app-icons.yml

permissions:
  contents: write

jobs:
  build-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build PNG icon set
        run: |
          python3 <<'PY'
          from pathlib import Path
          import struct
          import zlib

          root = Path(".")
          neon = (178, 255, 0, 255)
          black = (8, 10, 9, 255)

          def write_png(path, width, height, rgba):
              raw = bytearray()
              stride = width * 4
              for y in range(height):
                  raw.append(0)
                  raw.extend(rgba[y * stride:(y + 1) * stride])

              def chunk(kind, data):
                  return (
                      struct.pack(">I", len(data))
                      + kind
                      + data
                      + struct.pack(">I", zlib.crc32(kind + data) & 0xFFFFFFFF)
                  )

              png = b"\x89PNG\r\n\x1a\n"
              png += chunk(b"IHDR", struct.pack(">IIBBBBB", width, height, 8, 6, 0, 0, 0))
              png += chunk(b"IDAT", zlib.compress(bytes(raw), 9))
              png += chunk(b"IEND", b"")
              path.write_bytes(png)

          def make_icon(size, supersample=4):
              width = size * supersample
              height = size * supersample
              cx = (width - 1) / 2
              cy = (height - 1) / 2
              ax = size * 0.315 * supersample
              ay = size * 0.315 * supersample
              power = 2 / 3
              hi = bytearray(width * height * 4)

              for y in range(height):
                  dy = (y - cy) / ay
                  for x in range(width):
                      dx = (x - cx) / ax
                      inside = (abs(dx) ** power + abs(dy) ** power) <= 1
                      i = (y * width + x) * 4
                      hi[i:i + 4] = bytes(black if inside else neon)

              out = bytearray(size * size * 4)
              for y in range(size):
                  for x in range(size):
                      sums = [0, 0, 0, 0]
                      for yy in range(supersample):
                          base = ((y * supersample + yy) * width + x * supersample) * 4
                          for xx in range(supersample):
                              j = base + xx * 4
                              sums[0] += hi[j]
                              sums[1] += hi[j + 1]
                              sums[2] += hi[j + 2]
                              sums[3] += hi[j + 3]
                      n = supersample * supersample
                      k = (y * size + x) * 4
                      out[k:k + 4] = bytes(v // n for v in sums)
              return out

          for size, name in [
              (1024, "app-icon-1024.png"),
              (512, "app-icon-512.png"),
              (192, "app-icon-192.png"),
              (180, "apple-touch-icon.png"),
          ]:
              write_png(root / name, size, size, make_icon(size, 4 if size >= 512 else 5))

          (root / "app-icon.svg").write_text(
              '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">'
              '<rect width="1024" height="1024" fill="#b2ff00"/>'
              '<path fill="#080a09" d="M512 190C557 412 612 467 834 512C612 557 557 612 512 834C467 612 412 557 190 512C412 467 467 412 512 190Z"/>'
              '</svg>'
          )
          PY
      - name: Commit generated icons
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app-icon.svg app-icon-1024.png app-icon-512.png app-icon-192.png apple-touch-icon.png
          git commit -m "Update good app icon"
          git push
