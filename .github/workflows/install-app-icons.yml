name: install app icons

on:
  push:
    paths:
      - .github/workflows/install-app-icons.yml

permissions:
  contents: write

jobs:
  install-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Restore PNG icon set
        run: |
          printf '%s' '' | base64 -d > app-icon-512.png
          printf '%s' '' | base64 -d > app-icon-192.png
          printf '%s' '' | base64 -d > apple-touch-icon.png
      - name: Commit icons
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app-icon-512.png app-icon-192.png apple-touch-icon.png
          git commit -m "Add good app icons"
          git push
