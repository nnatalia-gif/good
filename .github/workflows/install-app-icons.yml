name: install app icons

on:
  push:
    paths:
      - .github/workflows/install-app-icons.yml

permissions:
  contents: write

jobs:
  install-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Write selected neon app icons
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64

          icons = {
              "app-icon-1024.png": "",
              "app-icon-512.png": "",
              "app-icon-192.png": "",
              "apple-touch-icon.png": ""
          }

          for name, payload in icons.items():
              Path(name).write_bytes(base64.b64decode(payload))
          PY
      - name: Commit selected icons
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app-icon-1024.png app-icon-512.png app-icon-192.png apple-touch-icon.png
          git commit -m "Update good app icon"
          git push
